pluginManagement {
    repositories {
        mavenLocal()
        mavenCentral()
        gradlePluginPortal()
        maven {
            name = 'Fabric'
            url = 'https://maven.fabricmc.net/'
        }
        maven {
            name = 'MinecraftForge'
            url = 'https://maven.minecraftforge.net/'
        }
        maven { url = 'https://maven.neoforged.net/releases' }

        maven  {
            name = "sponge"
            url = "https://repo.spongepowered.org/repository/maven-public/"
        }
    }
}

include(":common")
include(":fabric")
include(":forge")
include(":neoforge")